services:
  db:
    image: postgres:18
    expose:
      - "5432"
    environment:
      POSTGRES_USER: wasntaphoto
      POSTGRES_PASSWORD: wasntaphoto
      POSTGRES_DB: wasntaphoto
    restart: unless-stopped
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U wasntaphoto -d wasntaphoto" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+psycopg://wasntaphoto:wasntaphoto@db/wasntaphoto
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: >
      sh -c "
        PYTHONPATH=. alembic upgrade head &&
        gunicorn --bind 0.0.0.0:8000 app:app --workers 3 --worker-tmp-dir /dev/shm"
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend
