services:
  db:
    image: postgres:18
    expose:
      - "5432"
    environment:
      POSTGRES_USER: wasntaphoto
      POSTGRES_PASSWORD: wasntaphoto
      POSTGRES_DB: wasntaphoto
    restart: unless-stopped
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U wasntaphoto -d wasntaphoto" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8-alpine
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL_MIGRATIONS: postgresql+psycopg://wasntaphoto:wasntaphoto@db/wasntaphoto
      DATABASE_URL: postgresql+psycopg://wasntaphoto_app:wasntaphoto@db/wasntaphoto
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/liveness').raise_for_status()\"" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    command: >
      sh -c "PYTHONPATH=. DATABASE_URL=$$DATABASE_URL_MIGRATIONS alembic upgrade head && gunicorn app:app"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
