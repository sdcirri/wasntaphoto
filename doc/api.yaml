openapi: 3.1.0
info:
  title: WASNTAPhoto Backend
  version: 0.1.0
paths:
  /session/:
    post:
      tags:
      - Login
      summary: Login
      description: 'Logs in the user

        :param request: login request

        :param auth_service: auth service

        :return: the session token on successful login'
      operationId: login_session__post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCredentials'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Login Session  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /session/{session_id}:
    delete:
      tags:
      - Login
      summary: Logout Session
      description: 'Revokes the session token

        :param user_id: authenticated user ID

        :param session_id: session token to be revoked

        :param auth_service: auth service'
      operationId: logout_session_session__session_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 43
          maxLength: 43
          pattern: ^[A-Za-z0-9_-]+$
          title: Session Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{author_id}/posts/{post_id}/comments/:
    post:
      tags:
      - Users
      - Posts
      - Comments
      summary: Comment Post
      description: 'Comment on a post

        :param content: the comment text

        :param post_id: post ID of the post to comment

        :param comment_service: comment service

        :param user_id: authenticated user ID

        :return: the newly created comment'
      operationId: comment_post_users__author_id__posts__post_id__comments__post
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Post Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              minLength: 1
              maxLength: 2048
              title: Content
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{author_id}/posts/{post_id}/comments/{comment_id}:
    get:
      tags:
      - Users
      - Posts
      - Comments
      summary: Get Comment
      description: 'Gets a comment

        :param comment_id: comment ID

        :param comment_service: comment service

        :param _: authenticated user ID (unused)

        :return: the comment info'
      operationId: get_comment_users__author_id__posts__post_id__comments__comment_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: comment_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Comment Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Users
      - Posts
      - Comments
      summary: Delete Comment
      description: 'Deletes a comment

        :param comment_id: comment ID

        :param comment_service: comment service

        :param user_id: authenticated user ID'
      operationId: delete_comment_users__author_id__posts__post_id__comments__comment_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: comment_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Comment Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{author_id}/posts/{post_id}/comments/{comment_id}/like:
    get:
      tags:
      - Users
      - Posts
      - Comments
      summary: Is Liked
      description: 'Gets whether the comment was liked by the current user

        :param comment_id: comment ID

        :param comment_service: comment service

        :param user_id: authenticated user ID

        :return: whether the comment was liked by the current user'
      operationId: is_liked_users__author_id__posts__post_id__comments__comment_id__like_get
      security:
      - HTTPBearer: []
      parameters:
      - name: comment_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Comment Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: boolean
                title: Response Is Liked Users  Author Id  Posts  Post Id  Comments  Comment
                  Id  Like Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Users
      - Posts
      - Comments
      summary: Like Comment
      description: 'Likes a comment

        :param comment_id: comment ID

        :param comment_service: comment service

        :param user_id: authenticated user ID'
      operationId: like_comment_users__author_id__posts__post_id__comments__comment_id__like_put
      security:
      - HTTPBearer: []
      parameters:
      - name: comment_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Comment Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Users
      - Posts
      - Comments
      summary: Unlike Comment
      description: 'Unlikes a comment

        :param comment_id: comment ID

        :param comment_service: comment service

        :param user_id: authenticated user ID'
      operationId: unlike_comment_users__author_id__posts__post_id__comments__comment_id__like_delete
      security:
      - HTTPBearer: []
      parameters:
      - name: comment_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Comment Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{author_id}/posts/:
    get:
      tags:
      - Users
      - Posts
      summary: Get User Posts
      description: 'Get all posts from a specific user

        :param author_id: user ID (can also be "me")

        :param post_service: post service

        :param user_id: authenticated user ID

        :return: list of all posts from that user as IDs'
      operationId: get_user_posts_users__author_id__posts__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  type: integer
                type: array
                title: Response Get User Posts Users  Author Id  Posts  Get
      security:
      - HTTPBearer: []
    post:
      tags:
      - Users
      - Posts
      summary: New Post
      description: 'Get a post

        :param request: post creation request

        :param target_id: user ID (must be "me")

        :param post_service: post service

        :param user_id: authenticated user ID

        :return: the requested post'
      operationId: new_post_users__author_id__posts__post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /users/{author_id}/posts/{post_id}:
    get:
      tags:
      - Users
      - Posts
      summary: Get Post
      description: 'Get a post

        :param author_id: post author ID

        :param post_id: post ID

        :param post_service: post service

        :param user_id: authenticated user ID

        :return: the requested post'
      operationId: get_post_users__author_id__posts__post_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Post Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Users
      - Posts
      summary: Delete Post
      description: 'Deletes a post

        :param target_id: user ID (must be "me")

        :param post_id: post ID

        :param post_service: post service

        :param user_id: authenticated user ID'
      operationId: delete_post_users__author_id__posts__post_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Post Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{author_id}/posts/{post_id}/media:
    get:
      tags:
      - Users
      - Posts
      summary: Get Post Media
      operationId: get_post_media_users__author_id__posts__post_id__media_get
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Post Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{author_id}/posts/{post_id}/like:
    get:
      tags:
      - Users
      - Posts
      summary: Is Liked
      description: 'Gets whether the post was liked by the current user

        :param post_id: post ID

        :param post_service: post service

        :param user_id: authenticated user ID

        :return: whether the post was liked by the current user'
      operationId: is_liked_users__author_id__posts__post_id__like_get
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Post Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: boolean
                title: Response Is Liked Users  Author Id  Posts  Post Id  Like Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Users
      - Posts
      summary: Like Post
      description: 'Likes a post

        :param post_id: post ID

        :param post_service: post service

        :param user_id: authenticated user ID'
      operationId: like_post_users__author_id__posts__post_id__like_put
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Post Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Users
      - Posts
      summary: Unlike Post
      description: 'Unlikes a post

        :param post_id: post ID

        :param post_service: post service

        :param user_id: authenticated user ID'
      operationId: unlike_post_users__author_id__posts__post_id__like_delete
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Post Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{author_id}/posts/{post_id}/likes:
    get:
      tags:
      - Users
      - Posts
      summary: Get Likes
      description: 'Get your posts likes

        :param target_id: user ID (must be "me")

        :param post_id: post ID

        :param post_service: post service

        :param user_id: authenticated user ID

        :return: list of users who liked the post'
      operationId: get_likes_users__author_id__posts__post_id__likes_get
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: Post Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                title: Response Get Likes Users  Author Id  Posts  Post Id  Likes
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/:
    get:
      tags:
      - Users
      summary: Search Users
      description: 'Search for users

        :param user_service: user service

        :param q: query string

        :param l: number of results to return (max 100, default 10)

        :return: the list of the first *l* matching user IDs'
      operationId: search_users_users__get
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 3
          maxLength: 40
          title: Q
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                title: Response Search Users Users  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Users
      summary: Register User
      description: 'Registers in the user

        :param request: registration request

        :param auth_service: auth service

        :return: the session token on successful registration'
      operationId: register_user_users__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Register User Users  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{user_id}:
    get:
      tags:
      - Users
      summary: Get User Account
      description: 'Gets the specified user account info

        :param user_service: user service

        :param target_uid: target user ID (can also be ''me'')

        :param user_id: authenticated user ID

        :return: the user account info, if it exists'
      operationId: get_user_account_users__user_id__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccount'
      security:
      - HTTPBearer: []
  /users/{user_id}/propic:
    get:
      tags:
      - Users
      summary: Get User Propic
      description: 'Gets the specified user profile picture

        :param user_service: user service

        :param target_uid: target user ID (can also be ''me'')

        :param user_id: authenticated user ID

        :return: the user profile picture, if set'
      operationId: get_user_propic_users__user_id__propic_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /users/me/username:
    put:
      tags:
      - Users
      summary: Update Username
      description: 'Updates the current user username

        :param username: new username to set

        :param user_service: user service

        :param user_id: authenticated user ID'
      operationId: update_username_users_me_username_put
      requestBody:
        content:
          application/json:
            schema:
              type: string
              maxLength: 40
              minLength: 3
              title: Username
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /users/me/pp:
    put:
      tags:
      - Users
      summary: Update Propic
      description: 'Updates the current user propic

        :param request: new propic (raw bytes)

        :param user_service: user service

        :param user_id: authenticated user ID'
      operationId: update_propic_users_me_pp_put
      responses:
        '204':
          description: Successful Response
      security:
      - HTTPBearer: []
  /users/me/followers:
    get:
      tags:
      - Users
      summary: Get Followers
      description: 'Get the current user followers

        :param user_service: user service

        :param user_id: authenticated user ID

        :return: the current user followers'
      operationId: get_followers_users_me_followers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  type: integer
                type: array
                title: Response Get Followers Users Me Followers Get
      security:
      - HTTPBearer: []
  /users/me/followers/{to_remove_id}:
    delete:
      tags:
      - Users
      summary: Remove Follower
      description: 'Removes a follower

        :param to_remove_id: user ID of the follower to remove

        :param user_service: user service

        :param user_id: authenticated user ID'
      operationId: remove_follower_users_me_followers__to_remove_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: to_remove_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: To Remove Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/me/following:
    get:
      tags:
      - Users
      summary: Get Following
      description: 'Get the current user followed accounts

        :param user_service: user service

        :param user_id: authenticated user ID

        :return: the current user followed accounts'
      operationId: get_following_users_me_following_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  type: integer
                type: array
                title: Response Get Following Users Me Following Get
      security:
      - HTTPBearer: []
  /users/me/following/{to_follow_id}:
    post:
      tags:
      - Users
      summary: Follow User
      description: 'Follows a user

        :param to_follow_id: user ID of the user to follow

        :param user_service: user service

        :param user_id: authenticated user ID'
      operationId: follow_user_users_me_following__to_follow_id__post
      security:
      - HTTPBearer: []
      parameters:
      - name: to_follow_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: To Follow Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/me/following/{to_unfollow_id}:
    delete:
      tags:
      - Users
      summary: Unfollow User
      description: 'Unfollows a user

        :param to_unfollow_id: user ID of the user to unfollow

        :param user_service: user service

        :param user_id: authenticated user ID'
      operationId: unfollow_user_users_me_following__to_unfollow_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: to_unfollow_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: To Unfollow Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/me/blocked:
    get:
      tags:
      - Users
      summary: Get Blocked
      description: 'Get the current user blocked accounts

        :param user_service: user service

        :param user_id: authenticated user ID

        :return: the current user blocked accounts'
      operationId: get_blocked_users_me_blocked_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  type: integer
                type: array
                title: Response Get Blocked Users Me Blocked Get
      security:
      - HTTPBearer: []
  /users/me/blocked/{to_block_id}:
    post:
      tags:
      - Users
      summary: Block User
      description: 'Blocks a user

        :param to_block_id: user ID of the user to block

        :param user_service: user service

        :param user_id: authenticated user ID'
      operationId: block_user_users_me_blocked__to_block_id__post
      security:
      - HTTPBearer: []
      parameters:
      - name: to_block_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: To Block Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/me/blocked/{to_unblock_id}:
    delete:
      tags:
      - Users
      summary: Unblock User
      description: 'Unblocks a user

        :param to_unblock_id: user ID of the user to block

        :param user_service: user service

        :param user_id: authenticated user ID'
      operationId: unblock_user_users_me_blocked__to_unblock_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: to_unblock_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          title: To Unblock Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /feed/:
    get:
      tags:
      - Feed
      summary: Get Feed
      description: 'Gets the user''s feed

        :param post_service: post service

        :param user_id: user ID

        :param page_size: max number of posts to return (for pagination, default=100)

        :param page_number: page number (for pagination, default=0)

        :return: list of posts in the user''s feed in descending chronological order'
      operationId: get_feed_feed__get
      security:
      - HTTPBearer: []
      parameters:
      - name: n
        in: query
        required: false
        schema:
          type: integer
          default: 100
          title: N
      - name: p
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: P
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                title: Response Get Feed Feed  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /liveness:
    get:
      summary: Liveness
      operationId: liveness_liveness_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    Comment:
      properties:
        comment_id:
          type: integer
          minimum: 0.0
